<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CareerPath AI</title>
    <link rel="stylesheet" href="/frontend/style/output.css">
    <link rel="stylesheet" href="/frontend/style/signup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
</head>
<body class="text-gray-200 font-sans antialiased selection:bg-blue-500/30 min-h-screen flex flex-col relative">

    <!-- 3D Background Orbs -->
    <div class="orb orb-1 pointer-events-none"></div>
    <div class="orb orb-2 pointer-events-none"></div>
    <div class="orb orb-3 pointer-events-none"></div>
    
    <!-- Subtle grid overlay -->
    <div class="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.02)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.02)_1px,transparent_1px)] bg-[size:40px_40px] mix-blend-overlay pointer-events-none -z-10"></div>

    <!-- Navigation Bar -->
    <nav class="w-full relative z-20 px-6 py-6 flex justify-between items-center max-w-7xl mx-auto">
        <a href="/frontend/landing.html" class="flex items-center gap-3 group">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-purple-600 shadow-lg shadow-blue-500/20 flex items-center justify-center p-[2px]">
                <div class="w-full h-full bg-[#070709] rounded-lg bg-[url('/frontend/img/logo.jpg')] bg-cover bg-center"></div>
            </div>
            <h2 class="font-bold text-xl tracking-wide text-white group-hover:text-blue-400 transition-colors">CareerPath<span class="text-blue-500"> AI</span></h2>
        </a>
        <a href="/frontend/landing.html" class="text-sm font-medium text-gray-400 hover:text-white transition-colors flex items-center gap-2 px-4 py-2 rounded-full hover:bg-white/5 border border-transparent hover:border-white/10">
            <i class="fa-solid fa-arrow-left"></i> Back To Home
        </a>
    </nav>

    <!-- Main Auth Container -->
    <main class="flex-grow flex items-center justify-center px-4 relative z-10 w-full mb-12">
        <div class="w-full max-w-md glass-card rounded-[2rem] p-8 md:p-10 relative overflow-hidden group">
            <!-- Decorative accent line -->
            <div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-blue-500 to-transparent opacity-50"></div>
            
            <div class="text-center mb-8">
                <h2 class="text-3xl font-extrabold text-white mb-2 tracking-tight">Create Account</h2>
                <p class="text-gray-400 text-sm">Start your AI-powered learning journey today</p>
            </div>

            <form action="" method="post" class="space-y-4">
                <div class="space-y-1">
                    <label for="email" class="text-xs font-semibold text-gray-300 ml-1">Email <span class="text-red-400">*</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-500">
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                        <input type="email" name="email" id="email" placeholder="your@gmail.com" required autocomplete="off" 
                            class="input-field w-full rounded-xl py-3 pl-11 pr-4 text-white placeholder-gray-500 text-sm focus:ring-4 focus:ring-blue-500/10">
                    </div>
                </div>

                <div class="space-y-1">
                    <label for="password" class="text-xs font-semibold text-gray-300 ml-1">Password <span class="text-red-400">*</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-500">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                        <input type="password" name="password" id="password" placeholder="Create a strong password" required
                            class="input-field w-full rounded-xl py-3 pl-11 pr-4 text-white placeholder-gray-500 text-sm focus:ring-4 focus:ring-blue-500/10">
                    </div>
                </div>

                <div class="space-y-1">
                    <label for="confirm_password" class="text-xs font-semibold text-gray-300 ml-1">Confirm Password <span class="text-red-400">*</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-500">
                            <i class="fa-solid fa-shield-check"></i>
                        </div>
                        <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm your password" required
                            class="input-field w-full rounded-xl py-3 pl-11 pr-4 text-white placeholder-gray-500 text-sm focus:ring-4 focus:ring-blue-500/10">
                    </div>
                </div>

                <div class="flex items-center pt-2 pb-2">
                    <label class="flex items-center gap-2 cursor-pointer group/check">
                        <div class="relative flex items-center">
                            <input type="checkbox" class="peer sr-only">
                            <div class="w-4 h-4 rounded border border-gray-500 bg-transparent peer-checked:bg-blue-500 peer-checked:border-blue-500 transition-all flex items-center justify-center">
                                <i class="fa-solid fa-check text-[10px] text-white opacity-0 peer-checked:opacity-100 scale-50 peer-checked:scale-100 transition-all"></i>
                            </div>
                        </div>
                        <span class="text-sm text-gray-400 group-hover/check:text-gray-300 transition-colors">I agree to the <a href="#" class="text-blue-400 hover:text-blue-300">Terms of Service</a></span>
                    </label>
                </div>

                <button type="submit" class="w-full relative group/btn px-6 py-3.5 rounded-xl text-sm font-bold text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 transition-all shadow-lg shadow-blue-600/20 hover:shadow-blue-500/40 overflow-hidden cursor-pointer mt-2">
                    <div class="absolute inset-0 bg-white/20 -translate-x-full group-hover/btn:animate-[shimmer_1.5s_infinite]"></div>
                    <span class="flex items-center justify-center gap-2">Create Account <i class="fa-solid fa-arrow-right group-hover/btn:translate-x-1 transition-transform"></i></span>
                </button>
            </form>

            <div class="mt-8 relative flex items-center justify-center">
                <div class="w-full h-px bg-white/10 absolute"></div>
                <span class="px-4 text-xs font-medium text-gray-500 bg-[#070709] relative z-10 rounded-full border border-white/5 py-1">or continue with</span>
            </div>

            <div class="mt-6 grid grid-cols-2 gap-4">
                <button type="button" class="flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl bg-white/[0.04] border border-white/10 hover:bg-white/[0.08] hover:border-white/20 text-sm font-medium text-white transition-all cursor-pointer">
                    <i class="fa-brands fa-google text-red-500"></i> Google
                </button>
                <button type="button" class="flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl bg-white/[0.04] border border-white/10 hover:bg-white/[0.08] hover:border-white/20 text-sm font-medium text-white transition-all cursor-pointer">
                    <i class="fa-brands fa-github"></i> GitHub
                </button>
            </div>

            <p class="mt-8 text-center text-sm text-gray-400">
                Already have an account? <a href="/auth/signin.html" class="font-bold text-white hover:text-blue-400 transition-colors underline decoration-blue-500/30 underline-offset-4">Sign in</a>
            </p>
        </div>
    </main>
    
    <script src="/frontend/js/signup.js"></script>
</body>
</html>
